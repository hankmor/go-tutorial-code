# golangci-lint 配置示例 (极客老墨推荐版)
# 对应教程：1.2 代码风格与规范

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck     # 检查未处理的错误
    - gosimple     # 简化代码建议
    - govet        # 官方 vet 检查
    - ineffassign   # 检查无效赋值
    - staticcheck  # 静态分析
    - unused       # 检查未使用的代码
    - bodyclose    # 检查 HTTP body 是否关闭
    - gocyclo      # 检查函数圈复杂度 (建议阈值 15)
    - revive       # 替代 golint 的代码风格检查

linters-settings:
  gocyclo:
    min-complexity: 15

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
